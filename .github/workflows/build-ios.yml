name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: pod install
        working-directory: ios

      - name: Create self-signed certificate
        run: |
          security create-keychain -p "build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /tmp/cert.key \
            -out /tmp/cert.crt \
            -subj "/CN=iPhone Developer/O=MellyPlus/C=US"

          openssl pkcs12 -export \
            -inkey /tmp/cert.key \
            -in /tmp/cert.crt \
            -out /tmp/cert.p12 \
            -passout pass:"build123"

          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "build123" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "build" build.keychain

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "Found workspace: $WORKSPACE"
          PROJECT_NAME=$(ls ios/*.xcodeproj 2>/dev/null | head -1 | xargs basename | sed 's/.xcodeproj//')
          echo "scheme=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "Using scheme: $PROJECT_NAME"

      - name: Build and Archive
        run: |
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath ${{ github.workspace }}/build/app.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_IDENTITY="-" \
            ENABLE_BITCODE=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tail -50

      - name: Export IPA
        run: |
          echo "=== Archive contents ==="
          find ${{ github.workspace }}/build/app.xcarchive -name "*.app" -type d 2>/dev/null || echo "No .app found in archive"
          ls -la ${{ github.workspace }}/build/app.xcarchive/Products/ 2>/dev/null || echo "No Products dir"

          APP_PATH=$(find ${{ github.workspace }}/build/app.xcarchive -name "*.app" -type d | grep -v "\.app/" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Archive has no .app. Build did not produce the app bundle."
            echo "=== Archive tree ==="
            find ${{ github.workspace }}/build/app.xcarchive -maxdepth 4 -type d
            exit 1
          fi

          echo "Found app: $APP_PATH"
          mkdir -p ${{ github.workspace }}/build/Payload
          cp -r "$APP_PATH" ${{ github.workspace }}/build/Payload/
          cd ${{ github.workspace }}/build
          zip -r MellyPlus.ipa Payload
          rm -rf Payload
          echo "=== IPA created ==="
          ls -lh MellyPlus.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Melly-Plus-IPA
          path: build/MellyPlus.ipa
          retention-days: 30
