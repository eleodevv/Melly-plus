name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --clean

      - name: List iOS directory (debug)
        run: ls -la ios/

      - name: Find workspace name
        id: workspace
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -not -name "contentsdata*" | head -1 | xargs basename | sed 's/.xcworkspace//')
          if [ -z "$WORKSPACE" ]; then
            echo "No workspace found, listing ios dir:"
            ls -la ios/
            find ios -name "*.xcworkspace"
            exit 1
          fi
          echo "name=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "Found workspace: $WORKSPACE"

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build archive (unsigned)
        run: |
          cd ios
          SCHEME=$(xcodebuild -workspace "${{ steps.workspace.outputs.name }}.xcworkspace" -list | grep -A1 "Schemes:" | tail -1 | xargs)
          echo "Using scheme: $SCHEME"
          xcodebuild \
            -workspace "${{ steps.workspace.outputs.name }}.xcworkspace" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ${{ github.workspace }}/build/app.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA from archive
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/app.xcarchive -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r MellyPlus.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-Plus-IPA
          path: build/MellyPlus.ipa
          retention-days: 30
