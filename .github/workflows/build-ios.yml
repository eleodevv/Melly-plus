name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild (generate native iOS project)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Find workspace and scheme
        id: xcode
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" -not -path "*/Pods/*" | head -1)
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "Found workspace: $WORKSPACE"
          echo "=== All schemes ==="
          xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | sed -n '/Schemes:/,/^$/p' | grep -v "Schemes:" | grep -v "^$" | head -1 | xargs)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Using scheme: $SCHEME"

      - name: Build iOS app
        run: |
          xcodebuild \
            -workspace "${{ steps.xcode.outputs.workspace }}" \
            -scheme "${{ steps.xcode.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath ${{ github.workspace }}/build/app.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_BITCODE=NO \
            SKIP_INSTALL=NO \
            2>&1 | tail -30

      - name: Find and package IPA
        run: |
          echo "=== Archive contents ==="
          find ${{ github.workspace }}/build/app.xcarchive -name "*.app" -type d 2>/dev/null
          find ${{ github.workspace }}/build/app.xcarchive/Products -type d 2>/dev/null | head -10
          APP_PATH=$(find ${{ github.workspace }}/build/app.xcarchive/Products -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Trying alternative paths..."
            APP_PATH=$(find ${{ github.workspace }}/build/app.xcarchive -name "*.app" -type d 2>/dev/null | grep -v "\.app/" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive"
            find ${{ github.workspace }}/build/app.xcarchive -type d | head -20
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p output/Payload
          cp -r "$APP_PATH" output/Payload/
          cd output
          zip -r MellyPlus.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melly-Plus-IPA
          path: output/MellyPlus.ipa
          retention-days: 30
